<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test Email — vCISO.cl</title></head>
<body style="font-family:sans-serif;padding:40px;background:#0d1f3c;color:#fff">
  <h2>Test — Enviar email con descarga segura</h2>
  <p style="color:rgba(255,255,255,0.6);margin-bottom:24px">
    Envía el email de descarga con link firmado y marca de agua al comprador.
  </p>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <input id="emailInput" type="email" value="bgalvez@gmail.com"
           style="padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);
                  background:rgba(255,255,255,0.08);color:#fff;font-size:0.95rem;flex:1"/>
    <button onclick="enviar()"
            style="background:#e85d26;color:white;padding:12px 24px;border:none;
                   border-radius:8px;font-size:0.95rem;cursor:pointer;font-weight:700">
      📧 Enviar email
    </button>
  </div>
  <div id="resultado" style="margin-top:20px;padding:16px;border-radius:8px;display:none"></div>

  <script>
  async function enviar() {
    const email = document.getElementById('emailInput').value;
    const btn   = document.querySelector('button');
    const div   = document.getElementById('resultado');
    btn.textContent = '⏳ Enviando...';
    btn.disabled    = true;
    div.style.display = 'none';

    try {
      const resp = await fetch('/api/send-email', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email,
          product: 'ebook',
          order:   'EBOOK-TEST-' + Date.now(),
          amount:  5000
        })
      });
      const data = await resp.json();
      div.style.display = 'block';
      if (data.ok || data.emailId) {
        div.style.background = 'rgba(34,197,94,0.15)';
        div.style.border     = '1px solid rgba(34,197,94,0.3)';
        div.innerHTML = '✅ Email enviado! ID: ' + (data.emailId || 'OK') +
          '<br/><small style="color:rgba(255,255,255,0.5)">Revisa ' + email + '</small>';
      } else {
        div.style.background = 'rgba(239,68,68,0.15)';
        div.style.border     = '1px solid rgba(239,68,68,0.3)';
        div.innerHTML = '❌ Error: ' + JSON.stringify(data);
      }
    } catch(err) {
      div.style.display    = 'block';
      div.style.background = 'rgba(239,68,68,0.15)';
      div.innerHTML = '❌ ' + err.message;
    }
    btn.textContent = '📧 Enviar email';
    btn.disabled    = false;
  }
  </script>
</body>
</html>
